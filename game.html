<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machete Chase — A Runner for Your Life</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0a0a12;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
    user-select: none;
  }
  .wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    background: linear-gradient(#1a0f1f 0%, #2a1538 50%, #4a1a2a 100%);
    display: block;
    image-rendering: pixelated;
    box-shadow: 0 0 60px rgba(255, 0, 60, 0.3);
    border: 2px solid #3a1a2a;
    max-width: 100%;
    max-height: 100%;
  }
  .hud {
    position: absolute;
    top: 16px;
    left: 16px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-shadow: 0 0 8px #000;
    pointer-events: none;
  }
  .hud .label { color: #888; font-size: 11px; }
  .hud .val { color: #ff3355; font-size: 22px; }
  .hud .dist { color: #ffcc33; font-size: 18px; }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    text-align: center;
    padding: 20px;
    z-index: 10;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: 48px;
    letter-spacing: 4px;
    color: #ff3355;
    text-shadow: 0 0 20px #ff0033, 0 4px 0 #000;
    margin-bottom: 10px;
  }
  .overlay h2 {
    font-size: 20px;
    color: #ffcc33;
    margin-bottom: 24px;
    font-weight: 400;
  }
  .overlay p { color: #aaa; margin-bottom: 6px; font-size: 14px; }
  .overlay .keys { margin: 14px 0 20px; }
  .overlay kbd {
    display: inline-block;
    background: #222;
    border: 1px solid #444;
    border-bottom-width: 3px;
    padding: 4px 10px;
    border-radius: 4px;
    margin: 0 4px;
    font-family: monospace;
    color: #fff;
  }
  .overlay button {
    background: #ff3355;
    color: #fff;
    border: 0;
    padding: 14px 36px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 2px;
    box-shadow: 0 4px 0 #8a0020, 0 0 20px rgba(255,51,85,0.5);
    transition: transform 0.05s;
  }
  .overlay button:active { transform: translateY(2px); box-shadow: 0 2px 0 #8a0020; }
  .blood { color: #ff0033; font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="game" width="960" height="480"></canvas>
  <div class="hud">
    <div><span class="label">DISTANCE</span></div>
    <div class="dist" id="dist">0 m</div>
    <div><span class="label">CHASER</span></div>
    <div class="val" id="gap">— m behind</div>
  </div>
  <div class="overlay" id="overlay">
    <h1>MACHETE CHASE</h1>
    <h2>Run. Jump. Survive.</h2>
    <p>A masked killer is chasing you through the forest.</p>
    <p>You have <span class="blood">no weapon</span>. Only your legs.</p>
    <p>Jump over obstacles — tripping lets him catch you.</p>
    <div class="keys">
      <kbd>SPACE</kbd> or <kbd>↑</kbd> to jump
      &nbsp;&nbsp;
      <kbd>↓</kbd> to duck
    </div>
    <button id="startBtn">START RUNNING</button>
  </div>
</div>

<script>
(() => {
  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const GROUND_Y = H - 80;

  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const distEl = document.getElementById('dist');
  const gapEl = document.getElementById('gap');

  const keys = { jump: false, duck: false };
  window.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { keys.jump = true; e.preventDefault(); }
    if (e.code === 'ArrowDown') { keys.duck = true; e.preventDefault(); }
  });
  window.addEventListener('keyup', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') keys.jump = false;
    if (e.code === 'ArrowDown') keys.duck = false;
  });
  cv.addEventListener('pointerdown', () => { keys.jump = true; });
  cv.addEventListener('pointerup', () => { keys.jump = false; });

  // Player
  const player = {
    x: 180, y: GROUND_Y, vy: 0,
    w: 28, h: 52,
    onGround: true,
    ducking: false,
    frame: 0,
    speed: 0,        // horizontal boost when unhurt
    hurtTimer: 0,    // briefly slow after trip
    alive: true,
    caught: false,
    catchAnim: 0,
  };

  // Chaser
  const chaser = {
    x: 40, y: GROUND_Y,
    w: 34, h: 58,
    frame: 0,
    baseGap: 140,
    swing: 0,
  };

  // World
  let scroll = 0;           // total world distance (px)
  let worldSpeed = 6;       // base scroll speed
  let spawnTimer = 0;
  let obstacles = [];       // {x, w, h, type: 'log'|'rock'|'branch'}
  let trees = [];           // parallax background
  let particles = [];
  let running = false;
  let distance = 0;
  let gap = 0;              // horizontal distance from chaser to player (in px)

  function resetWorld() {
    player.x = 180; player.y = GROUND_Y; player.vy = 0;
    player.onGround = true; player.ducking = false;
    player.hurtTimer = 0; player.alive = true; player.caught = false; player.catchAnim = 0;
    chaser.x = 40; chaser.y = GROUND_Y; chaser.swing = 0;
    scroll = 0; worldSpeed = 6;
    spawnTimer = 60;
    obstacles = [];
    trees = [];
    particles = [];
    distance = 0; gap = player.x - chaser.x;
    for (let i = 0; i < 12; i++) trees.push({ x: Math.random() * W * 2, depth: 0.3 + Math.random() * 0.5, h: 80 + Math.random() * 80 });
  }

  function spawnObstacle() {
    const types = ['log', 'rock', 'branch'];
    const t = types[Math.floor(Math.random() * types.length)];
    let o;
    if (t === 'log') o = { type: t, x: W + 40, w: 60, h: 28, y: GROUND_Y };
    else if (t === 'rock') o = { type: t, x: W + 40, w: 40, h: 36, y: GROUND_Y };
    else o = { type: t, x: W + 40, w: 80, h: 20, y: GROUND_Y - 52 }; // low branch - duck
    obstacles.push(o);
  }

  // Drawing helpers
  function drawGround() {
    // Ground base
    ctx.fillStyle = '#1a0a12';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    // Path stripes (moving)
    ctx.fillStyle = '#2a1020';
    const stripeW = 40;
    const off = scroll % stripeW;
    for (let x = -off; x < W; x += stripeW) {
      ctx.fillRect(x, GROUND_Y + 4, stripeW - 6, 4);
    }
    // Dirt flecks
    ctx.fillStyle = '#3a1528';
    for (let i = 0; i < 30; i++) {
      const x = ((i * 73 - scroll * 1.2) % W + W) % W;
      const y = GROUND_Y + 20 + (i * 17) % 60;
      ctx.fillRect(x, y, 3, 2);
    }
    // Top line
    ctx.fillStyle = '#ff3355';
    ctx.fillRect(0, GROUND_Y - 1, W, 1);
  }

  function drawTrees() {
    for (const t of trees) {
      const x = ((t.x - scroll * t.depth) % (W * 2) + W * 2) % (W * 2) - 100;
      // Trunk
      ctx.fillStyle = `rgba(10, 5, 15, ${0.4 + t.depth * 0.5})`;
      ctx.fillRect(x + 20, GROUND_Y - t.h, 8, t.h);
      // Canopy
      ctx.beginPath();
      ctx.arc(x + 24, GROUND_Y - t.h, 30, 0, Math.PI * 2);
      ctx.fill();
    }
    // Moon
    ctx.fillStyle = 'rgba(255, 220, 180, 0.9)';
    ctx.beginPath();
    ctx.arc(W - 120, 80, 40, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(26, 15, 31, 0.9)';
    ctx.beginPath();
    ctx.arc(W - 108, 72, 36, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawPlayer() {
    const p = player;
    const cx = p.x;
    const footY = p.y;
    p.frame += running ? 0.35 : 0;

    const legSwing = Math.sin(p.frame) * 10;
    const armSwing = Math.sin(p.frame + Math.PI) * 8;

    ctx.save();
    if (p.caught) {
      // Falling over
      ctx.translate(cx, footY);
      ctx.rotate(Math.min(p.catchAnim * 0.05, Math.PI / 2));
      ctx.translate(-cx, -footY);
    }

    const bodyTop = footY - p.h;
    const duckOffset = p.ducking && p.onGround ? 12 : 0;

    // Legs
    ctx.strokeStyle = '#2233aa';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    if (p.onGround && !p.ducking) {
      ctx.beginPath();
      ctx.moveTo(cx - 3, footY - 20);
      ctx.lineTo(cx - 3 + legSwing * 0.6, footY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx + 3, footY - 20);
      ctx.lineTo(cx + 3 - legSwing * 0.6, footY);
      ctx.stroke();
    } else {
      // Tucked legs for jump / duck
      ctx.beginPath();
      ctx.moveTo(cx - 4, footY - 20 + duckOffset);
      ctx.lineTo(cx - 8, footY - duckOffset);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx + 4, footY - 20 + duckOffset);
      ctx.lineTo(cx + 8, footY - duckOffset);
      ctx.stroke();
    }

    // Body (white shirt)
    ctx.fillStyle = '#eef0f5';
    const bodyH = 22 - duckOffset;
    ctx.fillRect(cx - 10, bodyTop + 20 + duckOffset, 20, bodyH);

    // Arms
    ctx.strokeStyle = '#eec7a0';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(cx - 9, bodyTop + 24 + duckOffset);
    ctx.lineTo(cx - 9 + armSwing, bodyTop + 40 + duckOffset);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + 9, bodyTop + 24 + duckOffset);
    ctx.lineTo(cx + 9 - armSwing, bodyTop + 40 + duckOffset);
    ctx.stroke();

    // Head
    ctx.fillStyle = '#eec7a0';
    ctx.beginPath();
    ctx.arc(cx, bodyTop + 10 + duckOffset, 10, 0, Math.PI * 2);
    ctx.fill();
    // Hair
    ctx.fillStyle = '#3a1a0a';
    ctx.fillRect(cx - 10, bodyTop + (duckOffset), 20, 6);
    // Eye (scared)
    ctx.fillStyle = '#000';
    ctx.fillRect(cx + 4, bodyTop + 10 + duckOffset, 2, 2);

    // Hurt flash
    if (p.hurtTimer > 0) {
      ctx.fillStyle = `rgba(255, 50, 80, ${p.hurtTimer / 30})`;
      ctx.fillRect(cx - 12, bodyTop, 24, p.h);
    }

    ctx.restore();
  }

  function drawChaser() {
    const c = chaser;
    c.frame += running && !player.caught ? 0.4 : 0.08;
    const cx = c.x;
    const footY = c.y;
    const legSwing = Math.sin(c.frame) * 12;
    const armSwing = Math.sin(c.frame + Math.PI) * 10;
    const bodyTop = footY - c.h;

    // Legs (black pants)
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - 4, footY - 22);
    ctx.lineTo(cx - 4 + legSwing * 0.7, footY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + 4, footY - 22);
    ctx.lineTo(cx + 4 - legSwing * 0.7, footY);
    ctx.stroke();

    // Torso (dark jacket)
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(cx - 13, bodyTop + 20, 26, 26);
    // Shoulder shading
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(cx - 13, bodyTop + 20, 26, 4);

    // Left arm (free)
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(cx - 11, bodyTop + 24);
    ctx.lineTo(cx - 11 + armSwing, bodyTop + 42);
    ctx.stroke();

    // Right arm with machete (reaching forward)
    const reach = player.caught ? 18 : 14 + Math.sin(c.frame * 0.5) * 3;
    const swingAng = c.swing;
    ctx.save();
    ctx.translate(cx + 11, bodyTop + 26);
    ctx.rotate(-0.3 + swingAng);
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(reach, 6);
    ctx.stroke();
    // Machete handle
    ctx.fillStyle = '#3a1a0a';
    ctx.fillRect(reach - 2, 4, 8, 4);
    // Blade
    ctx.fillStyle = '#c8ccd0';
    ctx.beginPath();
    ctx.moveTo(reach + 6, 6);
    ctx.lineTo(reach + 34, 2);
    ctx.lineTo(reach + 38, 6);
    ctx.lineTo(reach + 34, 10);
    ctx.lineTo(reach + 6, 10);
    ctx.closePath();
    ctx.fill();
    // Blade highlight
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(reach + 10, 4, 20, 1);
    // Blood drip
    ctx.fillStyle = '#ff1133';
    ctx.fillRect(reach + 20, 10, 2, 4);
    ctx.restore();

    // Head (mask)
    ctx.fillStyle = '#d8d4cc';
    ctx.beginPath();
    ctx.arc(cx, bodyTop + 10, 11, 0, Math.PI * 2);
    ctx.fill();
    // Mask eyes (dark hollow)
    ctx.fillStyle = '#000';
    ctx.fillRect(cx - 6, bodyTop + 8, 3, 3);
    ctx.fillRect(cx + 3, bodyTop + 8, 3, 3);
    // Mask mouth
    ctx.fillStyle = '#3a0010';
    ctx.fillRect(cx - 3, bodyTop + 13, 6, 2);
    // Hood shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.arc(cx, bodyTop + 6, 11, Math.PI, Math.PI * 2);
    ctx.fill();
  }

  function drawObstacle(o) {
    if (o.type === 'log') {
      ctx.fillStyle = '#5a2a14';
      ctx.fillRect(o.x, o.y - o.h, o.w, o.h);
      ctx.fillStyle = '#3a1a08';
      ctx.fillRect(o.x, o.y - o.h, o.w, 4);
      // Rings
      ctx.strokeStyle = '#3a1a08';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(o.x + 8, o.y - o.h / 2, 8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(o.x + o.w - 8, o.y - o.h / 2, 8, 0, Math.PI * 2);
      ctx.stroke();
    } else if (o.type === 'rock') {
      ctx.fillStyle = '#555';
      ctx.beginPath();
      ctx.moveTo(o.x, o.y);
      ctx.lineTo(o.x + 5, o.y - o.h);
      ctx.lineTo(o.x + o.w - 8, o.y - o.h + 4);
      ctx.lineTo(o.x + o.w, o.y);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#777';
      ctx.beginPath();
      ctx.moveTo(o.x + 5, o.y - o.h);
      ctx.lineTo(o.x + o.w - 8, o.y - o.h + 4);
      ctx.lineTo(o.x + 12, o.y - o.h + 2);
      ctx.closePath();
      ctx.fill();
    } else if (o.type === 'branch') {
      // Hanging branch — must duck
      ctx.fillStyle = '#4a2410';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.fillStyle = '#1f4a14';
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.arc(o.x + 10 + i * 16, o.y + o.h, 10, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function spawnBlood(x, y) {
    for (let i = 0; i < 30; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 8,
        vy: -Math.random() * 6 - 2,
        life: 60,
        size: 2 + Math.random() * 3,
      });
    }
  }

  function updateParticles() {
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.4;
      p.life--;
    }
    particles = particles.filter(p => p.life > 0);
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.fillStyle = `rgba(255, 20, 40, ${p.life / 60})`;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
  }

  function collides(a, b) {
    // a is player; b is obstacle
    const px1 = a.x - 12;
    const px2 = a.x + 12;
    const py1 = a.y - a.h + (a.ducking && a.onGround ? 12 : 0);
    const py2 = a.y;
    const bx1 = b.x;
    const bx2 = b.x + b.w;
    const by1 = b.y - b.h;
    const by2 = b.y;
    return px1 < bx2 && px2 > bx1 && py1 < by2 && py2 > by1;
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    drawTrees();
    drawGround();

    if (running) {
      // Speed scaling
      worldSpeed = Math.min(6 + distance / 400, 12);

      // Player physics
      if (keys.jump && player.onGround && !player.caught) {
        player.vy = -15;
        player.onGround = false;
      }
      player.ducking = keys.duck && player.onGround;
      player.vy += 0.9;
      player.y += player.vy;
      if (player.y >= GROUND_Y) {
        player.y = GROUND_Y;
        player.vy = 0;
        player.onGround = true;
      }

      // World scroll
      const effectiveSpeed = worldSpeed - (player.hurtTimer > 0 ? 3 : 0);
      scroll += effectiveSpeed;
      distance += effectiveSpeed / 12;

      // Obstacles
      spawnTimer -= 1;
      if (spawnTimer <= 0) {
        spawnObstacle();
        spawnTimer = 50 + Math.random() * 70 - Math.min(distance / 30, 30);
      }
      for (const o of obstacles) o.x -= effectiveSpeed;
      obstacles = obstacles.filter(o => o.x + o.w > -40);

      // Collision
      if (player.hurtTimer > 0) player.hurtTimer--;
      if (!player.caught) {
        for (const o of obstacles) {
          if (collides(player, o) && player.hurtTimer <= 0) {
            player.hurtTimer = 30;
            // Push chaser closer — tripping lets him gain ground
            chaser.x += 50;
            break;
          }
        }
      }

      // Chaser dynamics
      // Normally holds a gap behind player. When player trips, gap shrinks.
      const targetGap = 140;
      const gapNow = player.x - chaser.x;
      if (!player.caught) {
        // Regress toward target gap
        chaser.x += (gapNow - targetGap) * 0.01;
      } else {
        // Catching animation — close in
        chaser.x += 2;
      }
      gap = player.x - chaser.x;

      // Catch detection
      if (!player.caught && gap < 28) {
        player.caught = true;
        chaser.swing = 0;
      }

      if (player.caught) {
        player.catchAnim++;
        chaser.swing = Math.sin(player.catchAnim * 0.4) * 0.8;
        if (player.catchAnim === 20) spawnBlood(player.x, player.y - 30);
        if (player.catchAnim === 45) spawnBlood(player.x, player.y - 20);
        if (player.catchAnim > 90) {
          running = false;
          gameOver();
        }
      }

      updateParticles();
    }

    // Draw obstacles
    for (const o of obstacles) drawObstacle(o);

    // Characters
    drawChaser();
    drawPlayer();
    drawParticles();

    // HUD
    distEl.textContent = Math.floor(distance) + ' m';
    const gapMeters = Math.max(0, Math.floor(gap / 12));
    gapEl.textContent = player.caught ? 'CAUGHT!' : gapMeters + ' m behind';
    gapEl.style.color = gap < 60 ? '#ff0033' : gap < 100 ? '#ffcc33' : '#ff3355';

    requestAnimationFrame(loop);
  }

  function start() {
    resetWorld();
    overlay.classList.add('hidden');
    running = true;
  }

  function gameOver() {
    overlay.classList.remove('hidden');
    overlay.querySelector('h1').textContent = 'YOU DIED';
    overlay.querySelector('h2').textContent = `You ran ${Math.floor(distance)} meters before he caught you.`;
    startBtn.textContent = 'RUN AGAIN';
  }

  startBtn.addEventListener('click', start);
  window.addEventListener('keydown', e => {
    if ((e.code === 'Enter' || e.code === 'Space') && !running && overlay.classList.contains('hidden') === false) {
      start();
    }
  });

  resetWorld();
  loop();
})();
</script>
</body>
</html>
